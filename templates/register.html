{% extends "base.html" %}

{% block title %}HotelRooms | Register{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-card wide">
        <p class="section-tag">Customer Registration</p>
        <h1>Create a new account</h1>
        <p>Register as a customer to book rooms and track reservations.</p>
        <form class="data-form" method="post">
            <input type="text" name="full_name" placeholder="Full Name" required>
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="text" name="city" placeholder="City" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <p class="form-link">Already registered? <a href="{{ url_for('login') }}">Go to login</a></p>
    </div>
</section>
{% endblock %}
