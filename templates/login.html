{% extends "base.html" %}

{% block title %}StaySphere | Login{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-card">
        <p class="section-tag">Account Access</p>
        <h1>Login to StaySphere</h1>
        <p>Owners and customers can both log in from here.</p>
        <form class="auth-form" method="post">
            <label>
                Username
                <input type="text" name="username" required>
            </label>
            <label>
                Password
                <input type="password" name="password" required>
            </label>
            <button type="submit">Login</button>
        </form>
        <p class="form-link">New customer? <a href="{{ url_for('register') }}">Create an account</a></p>
    </div>
</section>
{% endblock %}
